<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Weekmenu Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@10..48,400..700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#211E19; --paper:#F3EAD8; --card:#FBF6EC; --cardline:#E6D9C2;
  --ink:#29241D; --ink2:#6f6757; --ink3:#9a8e78; --gold:#A98A5E;
  --terra:#C2724E; --terra2:#E0916B; --olive:#8C9E6E; --olive2:#9DAA78;
  --honey:#E8C06A; --amber:#D9A441; --rust:#CD6A45;
  --shelley:#E0916B; --dirk:#8C9E6E; --maeve:#D9A441;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);font-family:'Hanken Grotesk',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
body{max-width:560px;margin:0 auto;min-height:100vh;background:var(--paper)}
.mono{font-family:'Space Mono',monospace}
.bric{font-family:'Bricolage Grotesque',sans-serif}
.serif{font-family:'Instrument Serif',serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit}

/* APP SHELL */
.app{background:var(--paper);min-height:100vh;position:relative;padding-bottom:90px}

/* STATUS / HEADER */
.topbar{padding:16px 22px 0}
.kicker{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
.h-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:34px;letter-spacing:-1.2px;color:var(--ink);line-height:0.96;margin-top:3px}
.avatars{display:flex}
.avatar{width:34px;height:34px;border-radius:50%;border:2px solid var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#fff}
.avatar+.avatar{margin-left:-11px}

/* PROGRESS NOTE */
.prog-note{font-family:'Instrument Serif',serif;font-style:italic;font-size:18px;color:var(--ink2);margin:14px 22px 0;line-height:1.3}

/* WEEK STRIP */
.weekstrip{display:flex;gap:6px;padding:16px 22px 4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.weekstrip::-webkit-scrollbar{display:none}
.day-pill{flex:0 0 auto;min-width:54px;padding:10px 6px;border-radius:16px;text-align:center;background:var(--card);border:1px solid var(--cardline)}
.day-pill.active{background:var(--ink);border-color:var(--ink)}
.day-pill.active .dp-day,.day-pill.active .dp-num,.day-pill.active .dp-dot{color:var(--paper)}
.dp-day{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink3)}
.dp-num{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:19px;color:var(--ink);line-height:1.1;margin-top:2px}
.dp-fill{display:flex;gap:2px;justify-content:center;margin-top:4px}
.dp-d{width:5px;height:5px;border-radius:50%;background:var(--cardline)}
.dp-d.on{background:var(--olive)}
.day-pill.active .dp-d{background:rgba(255,255,255,.3)}
.day-pill.active .dp-d.on{background:var(--honey)}

/* SECTION */
.scroll{padding:8px 22px 0}
.day-head{display:flex;align-items:baseline;justify-content:space-between;margin:18px 0 12px}
.day-head h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:25px;letter-spacing:-1px;color:var(--ink)}
.cook-tag{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink3)}

/* MEAL CARD */
.meal-card{background:var(--card);border:1px solid var(--cardline);border-radius:18px;padding:13px 14px;display:flex;gap:12px;align-items:center;margin-bottom:10px;cursor:pointer;transition:transform .12s,box-shadow .12s}
.meal-card:active{transform:scale(0.985)}
.meal-thumb{width:46px;height:46px;border-radius:13px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:22px}
.meal-info{flex:1;min-width:0}
.meal-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--gold);text-transform:uppercase}
.meal-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:15px;color:var(--ink);line-height:1.15;margin-top:2px}
.meal-name.empty{color:var(--ink3);font-weight:400;font-style:italic;font-family:'Instrument Serif',serif;font-size:17px}
.meal-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--ink3);margin-top:3px}
.meal-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:0 0 auto}
.mini-av{display:flex}
.mini-avatar{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--card);font-family:'Space Mono',monospace;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center}
.mini-avatar+.mini-avatar{margin-left:-7px}
.meal-add{width:30px;height:30px;border-radius:50%;background:var(--ink);color:var(--paper);font-size:18px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}

/* PERSON SUB-CARD (for split meals) */
.split-row{display:flex;gap:8px;align-items:center;padding:8px 10px;border-radius:12px;margin-top:6px;background:rgba(0,0,0,0.025)}
.split-badge{width:20px;height:20px;border-radius:50%;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.split-name{font-size:12px;color:var(--ink);flex:1}
.split-name.empty{color:var(--ink3);font-style:italic}

/* PLAN BUTTON */
.plan-cta{width:100%;background:var(--ink);color:var(--paper);border-radius:18px;padding:16px;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:16px;margin:8px 0 4px}
.plan-cta .badge{background:var(--terra);color:#fff;font-family:'Space Mono',monospace;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700}

/* BOTTOM NAV */
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;background:var(--card);border-top:1px solid var(--cardline);display:flex;justify-content:space-around;padding:10px 0 calc(10px + env(safe-area-inset-bottom));z-index:50}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;opacity:0.42;background:none;padding:4px 18px}
.nav-item.active{opacity:1}
.nav-item .label{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.5px;color:var(--ink)}
.nav-item.active .label{color:var(--terra)}

/* RECEPTEN */
.search-box{width:100%;background:var(--card);border:1px solid var(--cardline);border-radius:16px;padding:13px 16px;font-size:14px;color:var(--ink);outline:none;margin-bottom:12px}
.search-box::placeholder{color:var(--ink3)}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:8px 15px;border-radius:20px;background:var(--card);border:1px solid var(--cardline);font-family:'Space Mono',monospace;font-size:11px;color:var(--ink2);white-space:nowrap}
.chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip.dirk.active{background:var(--dirk);border-color:var(--dirk)}
.chip.shelley.active{background:var(--shelley);border-color:var(--shelley)}

.rec-card{background:var(--card);border:1px solid var(--cardline);border-radius:20px;padding:15px;margin-bottom:11px;cursor:pointer}
.rec-card.feature{background:linear-gradient(135deg,#E8C06A22,#CD6A4522);border:1px solid #E0916B55}
.rec-tag{display:inline-block;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--terra);margin-bottom:5px}
.rec-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:18px;color:var(--ink);letter-spacing:-0.5px;line-height:1.1}
.rec-desc{font-size:13px;color:var(--ink2);line-height:1.45;margin-top:5px}
.rec-meta{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink3);margin-top:8px}
.rec-actions{display:flex;gap:6px;margin-top:10px}
.rec-mini-btn{font-family:'Space Mono',monospace;font-size:10px;padding:5px 10px;border-radius:10px;background:rgba(0,0,0,0.04);color:var(--ink2)}

/* BOODSCHAPPEN */
.bood-progress{background:var(--card);border:1px solid var(--cardline);border-radius:20px;padding:18px;margin-bottom:18px}
.bood-bar{height:8px;border-radius:4px;background:var(--cardline);overflow:hidden;margin-top:10px}
.bood-bar-fill{height:100%;background:var(--olive);border-radius:4px;transition:width .3s}
.bood-group{margin-bottom:20px}
.bood-group-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.bood-group-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:16px;color:var(--ink)}
.bood-group-count{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink3)}
.bood-item{display:flex;align-items:center;gap:13px;padding:13px 15px;background:var(--card);border:1px solid var(--cardline);border-radius:14px;margin-bottom:7px;cursor:pointer}
.bood-item.checked{opacity:0.5}
.bood-item.checked .bi-name{text-decoration:line-through}
.bi-check{width:22px;height:22px;border-radius:7px;border:2px solid var(--cardline);flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;transition:all .15s}
.bi-check.on{background:var(--olive);border-color:var(--olive)}
.bi-name{flex:1;font-size:14px;color:var(--ink)}
.bi-amt{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink3)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(33,30,25,0.6);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;z-index:100}
@media(min-width:560px){.overlay{align-items:center}}
.sheet{background:var(--paper);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;border-radius:28px 28px 0 0;padding:8px 20px 30px}
@media(min-width:560px){.sheet{border-radius:28px}}
.sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--cardline);margin:8px auto 16px}
.sheet-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:24px;letter-spacing:-0.5px;color:var(--ink);margin-bottom:4px}
.sheet-sub{font-size:13px;color:var(--ink2);margin-bottom:16px}

/* MODAL TABS / PICKER */
.modal-meta{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink3);margin-bottom:14px}
.tab-row{display:flex;gap:8px;margin-bottom:16px}
.tab-btn{flex:1;padding:10px;border-radius:14px;background:var(--card);border:1px solid var(--cardline);font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--ink2)}
.tab-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.detail-tabs{display:flex;border-bottom:1px solid var(--cardline);margin-bottom:14px}
.detail-tab{flex:1;padding:10px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--ink3);border-bottom:2px solid transparent}
.detail-tab.active{color:var(--terra);border-bottom-color:var(--terra)}
.ing-line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--cardline);font-size:14px}
.ing-line:last-child{border-bottom:none}
.step-line{display:flex;gap:12px;margin-bottom:13px}
.step-dot{flex:0 0 auto;width:24px;height:24px;border-radius:50%;background:var(--terra);color:#fff;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.step-txt{font-size:14px;line-height:1.5;color:var(--ink);flex:1;padding-top:1px}

/* FORM */
.field{margin-bottom:14px}
.field label{display:block;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--card);border:1px solid var(--cardline);border-radius:13px;padding:12px 14px;font-size:14px;color:var(--ink);outline:none}
.field textarea{resize:vertical;line-height:1.5}
.row-fields{display:flex;gap:10px}
.tag-pick{display:flex;gap:8px}
.tag-opt{flex:1;padding:11px;border-radius:13px;background:var(--card);border:2px solid var(--cardline);font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--ink2);text-align:center}
.tag-opt.dirk.on{border-color:var(--dirk);background:#8C9E6E22;color:var(--dirk)}
.tag-opt.shelley.on{border-color:var(--shelley);background:#E0916B22;color:var(--shelley)}
.tag-opt.beiden.on{border-color:var(--amber);background:#D9A44122;color:var(--amber)}

/* PICKER GRID */
.picker-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-height:50vh;overflow-y:auto}
.picker-card{background:var(--card);border:1px solid var(--cardline);border-radius:15px;padding:12px;cursor:pointer}
.picker-card:active{transform:scale(0.97)}
.pc-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:14px;color:var(--ink);line-height:1.15}
.pc-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--ink3);margin-top:5px}

/* BTN */
.btn{border-radius:15px;padding:14px;font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:15px;text-align:center;width:100%}
.btn-ink{background:var(--ink);color:var(--paper)}
.btn-line{background:var(--card);border:1px solid var(--cardline);color:var(--ink2)}
.btn-terra{background:var(--terra);color:#fff}
.btn-row{display:flex;gap:10px;margin-top:8px}

/* WIZARD */
.wiz-step{margin-bottom:18px}
.wiz-q{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:17px;color:var(--ink);margin-bottom:10px}
.wiz-days{display:flex;flex-wrap:wrap;gap:7px}
.wiz-day{padding:9px 13px;border-radius:13px;background:var(--card);border:1.5px solid var(--cardline);font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--ink2)}
.wiz-day.cook{background:var(--olive);border-color:var(--olive);color:#fff}
.wiz-day.rest{background:var(--honey);border-color:var(--honey);color:var(--ink)}
.wiz-hint{font-size:12px;color:var(--ink3);margin-top:8px;line-height:1.4}

/* EMPTY */
.empty-state{text-align:center;padding:50px 30px;color:var(--ink2)}
.empty-emoji{font-size:44px;margin-bottom:12px}
.empty-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:19px;color:var(--ink);margin-bottom:6px}

.spin{animation:spin 0.8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:12px 22px;border-radius:14px;font-size:13px;font-weight:600;z-index:200;animation:toastIn .3s}
@keyframes toastIn{from{opacity:0;transform:transl(-50%,10px)}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-host"></div>
<script>
// ===================== CONFIG =====================
const DAYS = ["ma","di","wo","do","vr","za","zo"];
const DAY_FULL = {ma:"maandag",di:"dinsdag",wo:"woensdag",do:"donderdag",vr:"vrijdag",za:"zaterdag",zo:"zondag"};
const DAY_NUM = {ma:9,di:10,wo:11,do:12,vr:13,za:14,zo:15}; // wordt dynamisch berekend
const CATS = ["ontbijt","lunch","diner","tussendoortje"];
const CL = {ontbijt:"Ontbijt",lunch:"Lunch",diner:"Diner",tussendoortje:"Snack"};
const HH = 3;

// People
const PEOPLE = {
  shelley: {label:"Shelley", sub:"zwanger", color:"var(--shelley)", initial:"S"},
  dirk: {label:"Dirk", sub:"afvallen", color:"var(--dirk)", initial:"D"},
  maeve: {label:"Maeve", sub:"2 jr", color:"var(--maeve)", initial:"M"},
};

// Meal thumbnail colors by category
const THUMB = {ontbijt:"#E8C06A", lunch:"#9DAA78", diner:"#CD6A45", tussendoortje:"#E0916B"};
const THUMB_EMOJI = {ontbijt:"🥣", lunch:"🥗", diner:"🍽️", tussendoortje:"🍎"};

// Ebook colors (kept for recipe source)
const EC={1:"#E0916B",2:"#8C9E6E",3:"#9DAA78",4:"#C2724E",5:"#E8C06A",6:"#70a0a0",7:"#CD6A45",0:"#D9A441"};
const EL={1:"Broodje Dunner 1",2:"Broodje Dunner 2",3:"Broodje Dunner 3",4:"Broodje Dunner 4",5:"Broodje Dunner 5",6:"Broodje Dunner 6",7:"Broodje Dunner 7",0:"Eigen recept"};

// Planner rows
const ROWS = [
  {id:"ontbijt_dirk", label:"Ontbijt", who:"dirk", cat:"ontbijt", split:true},
  {id:"ontbijt_shelley", label:"Ontbijt", who:"shelley", cat:"ontbijt", split:true},
  {id:"tussen_ochtend", label:"Tussendoor", who:"samen", cat:"tussendoortje", split:false, sub:"ochtend"},
  {id:"lunch_dirk", label:"Lunch", who:"dirk", cat:"lunch", split:true},
  {id:"lunch_shelley", label:"Lunch", who:"shelley", cat:"lunch", split:true},
  {id:"tussen_middag", label:"Tussendoor", who:"samen", cat:"tussendoortje", split:false, sub:"middag"},
  {id:"diner", label:"Diner", who:"samen", cat:"diner", split:false},
];

// Boodschappen categories
const BOOD_CATS = {
  "groente_fruit":{label:"🥦 Groente & Fruit", words:["groente","sla","spinazie","paprika","tomaat","courgette","ui","knoflook","wortel","broccoli","champignon","avocado","komkommer","prei","bloemkool","pastinaak","biet","asperge","bosui","sjalot","radijs","gember","andijvie","appel","banaan","aardbei","bes","framboos","kiwi","meloen","druif","citroen","limoen","mango","granaatappel","pruim","peer","zoete aardappel","krieltjes","aardappel","peterselie","basilicum","koriander","bieslook","peer","rucola"]},
  "vlees_vis":{label:"🥩 Vlees & Vis", words:["kip","gehakt","zalm","tonijn","kabeljauw","garnaal","rivierkreeft","varken","rund","ossenhaas","tartaar","ham","spek","worst","filet"]},
  "zuivel":{label:"🥛 Zuivel & Eieren", words:["yoghurt","kwark","kaas","ei","melk","room","boter","feta","mozzarella","parmezaan","huttenkase","hüttenkäse","creme","crème","zuivelspread","optimel","skyr"]},
  "brood_granen":{label:"🌾 Brood & Granen", words:["rijst","pasta","orzo","havermout","tortilla","brood","boterham","wrap","speltmeel","cornflakes","nori","rijstwafel","noodles","couscous","quinoa","bulgur","meel","granola"]},
  "blik_pot":{label:"🥫 Blik & Pot", words:["tomatenblokjes","tomatenpuree","tomatenpulp","bonen","mais","linzen","kokosmelk","sojasaus","ketjap","pindakaas","olijven","kikkererwten","passata"]},
  "kruiden":{label:"🫙 Kruiden & Olie", words:["olie","azijn","honing","mosterd","saus","kruiden","kaneel","kurkuma","kerrie","komijn","paprikapoeder","oregano","cajun","stevia","zoetstof","vanille","cacao","bouillon","chili","gember","nootmuskaat","garam"]},
  "overig":{label:"📦 Overig", words:[]},
};
function getBoodCat(name){
  const n=name.toLowerCase();
  for(const [cat,obj] of Object.entries(BOOD_CATS)){
    if(cat==="overig")continue;
    if(obj.words.some(w=>n.includes(w)))return cat;
  }
  return "overig";
}

// Recipe factory
const r=(id,eb,name,cat,time,ing,steps,srv,voor)=>({id,ebook:eb,name,category:cat,time,ingredients:ing,steps,servings:srv||2,voor:voor||"beiden"});
const i=(n,a)=>({n,a});


// ===================== RECIPES =====================
const RECIPES=[

const SK="wm_week_v2", CK="wm_custom_v2", NK="wm_notes_v2", CHK="wm_check_v2", CFG="wm_cfg_v2", BOK="wm_boodOver_v1";
function lsGet(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

function emptyWeek(){const w={};DAYS.forEach(d=>{w[d]={};ROWS.forEach(row=>{w[d][row.id]=null});});return w;}

// Week dates: compute Mon-Sun for a given week offset (0=this week, 1=next, -1=last)
function weekDates(offsetWeeks=0){
  const now=new Date();
  now.setDate(now.getDate()+offsetWeeks*7);
  const day=now.getDay();
  const mon=new Date(now); mon.setDate(now.getDate()-((day+6)%7));
  const nums={}; const out=[];
  DAYS.forEach((d,idx)=>{const dt=new Date(mon);dt.setDate(mon.getDate()+idx);nums[d]=dt.getDate();out.push(dt);});
  const jan1=new Date(now.getFullYear(),0,1);
  const wk=Math.ceil((((now-jan1)/86400000)+jan1.getDay()+1)/7);
  const months=["jan","feb","mrt","apr","mei","jun","jul","aug","sep","okt","nov","dec"];
  const range=`${out[0].getDate()}–${out[6].getDate()} ${months[out[6].getMonth()]}`;
  const key=`${now.getFullYear()}_${wk}`;
  return {nums, wk, range, key};
}
function weekStoreKey(offset){ return `wm_week_${weekDates(offset).key}`; }
function notesStoreKey(offset){ return `wm_notes_${weekDates(offset).key}`; }
function curWeek(){ return weekDates(S.weekOffset||0); }
// Fallback: migrate old single-week data to new keyed format on first load
(function migrate(){
  const old=lsGet(SK,null);
  if(old){const k=weekStoreKey(0);if(!lsGet(k,null)){lsSet(k,old);}try{localStorage.removeItem(SK);}catch(e){}}
  const oldN=lsGet(NK,null);
  if(oldN){const k=notesStoreKey(0);if(!lsGet(k,null)){lsSet(k,oldN);}try{localStorage.removeItem(NK);}catch(e){}}
})();

function save(){
  lsSet(weekStoreKey(S.weekOffset||0),S.week);
  lsSet(notesStoreKey(S.weekOffset||0),S.notes);
  lsSet(CK,S.custom);lsSet(CHK,S.checked);lsSet(CFG,S.cfg);lsSet(BOK,S.boodOverride);
}
function switchWeek(offset){
  save(); // flush current week first
  const newWeek=lsGet(weekStoreKey(offset),emptyWeek());
  const newNotes=lsGet(notesStoreKey(offset),{});
  set({weekOffset:offset, week:newWeek, notes:newNotes, activeDay:DAYS[(new Date().getDay()+6)%7]});
}
function set(patch){Object.assign(S,patch);save();render();}
function ALL(){return [...RECIPES,...S.custom];}

// ===================== HELPERS =====================
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function scaleAmt(amt,srv){if(!amt)return amt;const f=HH/(srv||2);if(Math.abs(f-1)<0.01)return amt;const n=parseFloat(amt);if(isNaN(n))return amt;return amt.replace(String(n),String(Math.round(n*f*10)/10));}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function toast(msg){const h=document.getElementById("toast-host");const t=document.createElement("div");t.className="toast";t.textContent=msg;h.appendChild(t);setTimeout(()=>t.remove(),2000);}

function avatarStack(whoList,size){
  size=size||"mini";
  return `<div class="${size==='mini'?'mini-av':'avatars'}">`+whoList.map(w=>{
    const p=PEOPLE[w];if(!p)return"";
    const cls=size==='mini'?'mini-avatar':'avatar';
    return `<div class="${cls}" style="background:${p.color}">${p.initial}</div>`;
  }).join("")+`</div>`;
}

// ===================== WEEK STATS =====================
function weekStats(){
  let filled=0, total=0;
  DAYS.forEach(d=>{ROWS.forEach(row=>{total++;if(S.week[d]&&S.week[d][row.id])filled++;});});
  return {filled,total,empty:total-filled};
}
function dayFillCount(day){
  let n=0;ROWS.forEach(row=>{if(S.week[day]&&S.week[day][row.id])n++;});return n;
}

// ===================== FILTERED RECIPES =====================
function recipesForRow(rowId){
  const row=ROWS.find(r=>r.id===rowId);
  return ALL().filter(rc=>{
    if(row){
      if(row.who==="dirk"&&rc.voor==="shelley")return false;
      if(row.who==="shelley"&&rc.voor==="dirk")return false;
      if(rc.category!==row.cat)return false;
    }
    if(S.search&&!rc.name.toLowerCase().includes(S.search.toLowerCase()))return false;
    return true;
  });
}

// ===================== BOODSCHAPPEN =====================
function boodschappen(){
  const m={};
  DAYS.forEach(d=>ROWS.forEach(row=>{
    const rc=S.week[d]&&S.week[d][row.id];if(!rc)return;
    (rc.ingredients||[]).forEach(g=>{
      const k=(g.n||"").toLowerCase();
      if(!m[k])m[k]={name:g.n,amounts:[],cat:getBoodCat(g.n),sources:[]};
      const sc=scaleAmt(g.a,rc.servings);
      if(sc&&!m[k].amounts.includes(sc))m[k].amounts.push(sc);
      m[k].sources.push({day:d,rcName:rc.name,amount:sc||g.a||""});
    });
  }));
  const grouped={};Object.keys(BOOD_CATS).forEach(c=>grouped[c]=[]);
  Object.values(m).forEach(it=>{(grouped[it.cat]=grouped[it.cat]||[]).push(it);});
  return grouped;
}
function toggleCheck(k){S.checked={...S.checked,[k]:!S.checked[k]};set({});}
function openBoodDetail(idx){set({boodDetail:idx});}
function closeBoodDetail(){set({boodDetail:null});}
function saveBoodOverride(k){
  const val=(document.getElementById("bood-amt-input")||{}).value||"";
  S.boodOverride={...S.boodOverride,[k]:val||undefined};
  if(!val)delete S.boodOverride[k];
  set({boodDetail:null});
}
function deleteBoodOverride(k){
  const o={...S.boodOverride};delete o[k];
  set({boodOverride:o,boodDetail:null});
}

function runAutofill(){
  // Fill empty slots intelligently
  const by={};CATS.forEach(c=>{by[c]=shuf(ALL().filter(rc=>rc.category===c));});
  const cnt={};CATS.forEach(c=>cnt[c]=0);
  const pick=(cat,filterVoor)=>{
    const pool=by[cat].filter(rc=>{
      if(filterVoor==="dirk"&&rc.voor==="shelley")return false;
      if(filterVoor==="shelley"&&rc.voor==="dirk")return false;
      return true;
    });
    if(!pool.length)return null;
    const rc=pool[cnt[cat]%pool.length];cnt[cat]++;return rc;
  };
  DAYS.forEach(day=>{
    const mode=S.cfg.cookDays[day]||"cook";
    if(mode==="none")return;
    ROWS.forEach(row=>{
      if(S.week[day][row.id])return; // keep existing
      // on "rest" days, only fill simple/leftover - skip diner fancy
      const rc=pick(row.cat,row.who);
      if(rc)S.week[day][row.id]=rc;
    });
  });
  set({wizOpen:false,wizStep:1});
  toast("Week ingevuld! 🎉");
}

async function exportImg(type){

// ===================== IG IMPORT =====================
async function doImport(){
  const cap=document.getElementById("ig-cap").value.trim();
  const url=document.getElementById("ig-url").value.trim();
  if(cap.length<20){toast("Plak eerst een caption");return;}
  set({igSt:"loading",igErr:"",igPrev:null,igCap:cap,igUrl:url});
  try{
    const msg="Extraheer het recept uit deze Instagram caption. Geef ALLEEN geldige JSON, geen markdown. "+
      "Formaat: {name, category, time, servings, ingredients:[{n,a}], steps:[]}. "+
      "category is: ontbijt, lunch, diner of tussendoortje. servings is een getal. "+
      "Geen recept gevonden: {error:true}. Caption: "+cap;
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:msg}]})});
    if(!res.ok)throw new Error("API fout "+res.status);
    const data=await res.json();
    const block=(data.content||[]).find(b=>b.type==="text");
    const txt=block?block.text:"";
    const fi=txt.indexOf("{"),li=txt.lastIndexOf("}");
    if(fi<0||li<=fi)throw new Error("Geen recept gevonden");
    const p=JSON.parse(txt.slice(fi,li+1));
    if(p.error)throw new Error("Geen recept in deze tekst gevonden");
    set({igSt:"ok",igPrev:{id:Date.now(),ebook:0,custom:true,voor:"beiden",name:p.name||"",category:p.category||"ontbijt",time:p.time||"?",servings:p.servings||2,ingredients:p.ingredients||[],steps:p.steps||[],link:url||null}});
  }catch(e){set({igSt:"err",igErr:e.message||"Mislukt"});}
}

const SHELLEY_VERMIJD = ["rauwe vis","alcohol","lever","rauw vlees","rauwe eieren","schimmelkaas","cafeïne","veel suiker","processed food"];
const SHELLEY_VOORKEUR = ["ijzerrijk","calciumrijk","eiwitrijk","foliumzuur","omega-3","licht verteerbaar","warm","koud","snel klaar"];
const DAY_MODES = {cook:"🍳 Koken",quick:"⚡ Snel (<20 min)",rest:"🥡 Restjes",off:"🚫 Vrij"};

function wizGenPreview(force){
  const {cookDays, shelley, mealprep} = S.wiz;
  const planDays = S.wiz.planDays;
  const prev = {}; // {wo: {day: {rowId: rc}}}
  const by = {};
  ["ontbijt","lunch","diner","tussendoortje"].forEach(cat=>{
    by[cat]=shuf(ALL().filter(rc=>rc.category===cat));
  });
  let idx={ontbijt:0,lunch:0,diner:0,tussendoortje:0};

  function pick(cat,who){
    const pool=by[cat].filter(rc=>{
      if(who==="dirk"&&rc.voor==="shelley")return false;
      if(who==="shelley"&&rc.voor==="dirk")return false;
      if(who==="shelley"&&shelley.vermijd.length){
        const nm=rc.name.toLowerCase();const st=(rc.steps||[]).join(" ").toLowerCase();
        if(shelley.vermijd.some(v=>nm.includes(v.toLowerCase())||st.includes(v.toLowerCase())))return false;
      }
      return true;
    });
    if(!pool.length)return null;
    const rc=pool[idx[cat]%pool.length];idx[cat]++;return rc;
  }

  [0,1].forEach(wo=>{
    prev[wo]={};
    const existingWeek=lsGet(weekStoreKey(wo),emptyWeek());
    DAYS.forEach(day=>{
      const isPlanned=planDays.some(p=>p.wo===wo&&p.day===day);
      if(!isPlanned){
        prev[wo][day]=existingWeek[day]?{...existingWeek[day]}:{};return;
      }
      prev[wo][day]={};
      const mode=cookDays[`${wo}_${day}`]||"cook";
      if(mode==="off"){ROWS.forEach(row=>prev[wo][day][row.id]=null);return;}
      ROWS.forEach(row=>{
        if(!force&&existingWeek[day]&&existingWeek[day][row.id]){prev[wo][day][row.id]=existingWeek[day][row.id];return;}
        if(mode==="quick"&&row.cat==="diner"){
          const fast=by["diner"].filter(rc=>{const m=parseInt(rc.time);return m&&m<=20;});
          prev[wo][day][row.id]=fast.length?fast[idx["diner"]++%fast.length]:pick("diner",row.who);return;
        }
        if(mode==="rest"&&row.id==="diner"){prev[wo][day][row.id]=null;return;}
        prev[wo][day][row.id]=pick(row.cat,row.who);
      });
    });
  });

  // Sync lunch_dirk = lunch_shelley for non-mealprep days
  [0,1].forEach(wo=>{
    DAYS.forEach(day=>{
      if(!prev[wo]||!prev[wo][day])return;
      const isMp=S.wiz.doMealprep&&mealprep.rc&&mealprep.days.some(m=>m.wo===wo&&m.day===day);
      if(!isMp)prev[wo][day]["lunch_dirk"]=prev[wo][day]["lunch_shelley"];
    });
  });
  if(S.wiz.doMealprep&&mealprep.rc&&mealprep.days.length>0){
    mealprep.days.forEach(m=>{if(prev[m.wo]&&prev[m.wo][m.day])prev[m.wo][m.day]["lunch_dirk"]=mealprep.rc;});
  }
  if(S.wiz.baksel&&S.wiz.baksel!=="Nee"){
    const bakseltxt=S.wiz.baksel+(S.wiz.bakselNote?" — "+S.wiz.bakselNote:"");
    S.notes["zo"]={...(S.notes["zo"]||{}),algemeen:"🎂 "+bakseltxt};
    lsSet(notesStoreKey(S.weekOffset||0),S.notes);
  }
  S.wiz.preview=prev;
  set({wizStep:3});
}

async function wizDoImport(){
  const cap = document.getElementById("wiz-ig-cap").value.trim();
  if(cap.length<20){toast("Plak eerst een caption");return;}
  set({wizIgSt:"loading",wizIgErr:"",wizIgPrev:null,wizIgCap:cap});
  try{
    const msg="Extraheer het recept uit deze Instagram caption. Geef ALLEEN geldige JSON, geen markdown. "+
      "Formaat: {name,category,time,servings,ingredients:[{n,a}],steps:[]}. "+
      "category is: ontbijt, lunch, diner of tussendoortje. Geen recept: {error:true}. Caption: "+cap;
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1500,messages:[{role:"user",content:msg}]})});
    if(!res.ok) throw new Error("API fout "+res.status);
    const data=await res.json();
    const txt=((data.content||[]).find(b=>b.type==="text")||{}).text||"";
    const fi=txt.indexOf("{"),li=txt.lastIndexOf("}");
    if(fi<0) throw new Error("Geen recept gevonden");
    const p=JSON.parse(txt.slice(fi,li+1));
    if(p.error) throw new Error("Geen recept in deze tekst");
    const rc={id:Date.now(),ebook:0,custom:true,voor:"beiden",...p,servings:p.servings||2};
    // Save to custom recipes
    S.custom=[...S.custom,rc]; lsSet(CK,S.custom);
    // Assign to slot
    const {wo,day,rowId}=S.wizSlotIg;
    S.wiz.preview[wo][day][rowId]=rc;
    set({wizIgSt:null,wizSlotIg:null,wizIgPrev:null});
    toast("Recept geïmporteerd en ingepland! ✨");
  }catch(e){ set({wizIgSt:"err",wizIgErr:e.message}); }
}

// STAP 5 — Wat heb je al in huis?
function renderWizStep4(){
  // Collect all ingredients from preview
  const allIng = {};
  Object.values(S.wiz.preview).forEach(weekData=>{
    Object.values(weekData||{}).forEach(day=>{
    ROWS.forEach(row=>{
      const rc = day&&day[row.id];
      if(!rc)return;
      (rc.ingredients||[]).forEach(g=>{
        const k = (g.n||"").toLowerCase();
        if(!allIng[k]) allIng[k] = {name:g.n, amounts:[]};
        const sc = scaleAmt(g.a,rc.servings);
        if(sc&&!allIng[k].amounts.includes(sc)) allIng[k].amounts.push(sc);
      });
    });
    });
  });
  const items = Object.entries(allIng);
  const inHuis = items.filter(([k])=>S.wiz.inHuis[k]).length;

  return `
  <div class="sheet-title">Wat heb je al in huis?</div>
  <div class="sheet-sub" style="margin-bottom:14px">Vink aan wat je al hebt — die halen we van de boodschappenlijst.</div>
  <div style="max-height:48vh;overflow-y:auto;background:var(--card);border-radius:16px;border:1px solid var(--cardline);margin-bottom:14px">
    ${items.map(([k,it])=>{
      const chk = !!S.wiz.inHuis[k];
      return `
      <div onclick="wizToggleInHuis('${esc(k).replace(/'/g,"")}')"
        style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--cardline);cursor:pointer;${chk?"opacity:0.5":""}">

        <span style="flex:1;font-size:14px;color:var(--ink)">${esc(it.name)}</span>
        ${it.amounts.length?`<span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--ink3)">${esc(it.amounts.join(", "))}</span>`:""}
      </div>`;
    }).join("")}
  </div>
  ${inHuis>0?`<div style="font-size:13px;color:var(--olive);margin-bottom:10px;font-weight:600">✓ ${inHuis} ingrediënten al in huis — worden niet besteld</div>`:""}
  <div class="btn-row">
    <button class="btn btn-line" onclick="set({wizStep:3})">← Terug</button>
    <button class="btn btn-terra" onclick="wizFinish()">✓ Week inplannen!</button>
  </div>`;
}

// ===================== EXTRA WIZARD HELPERS =====================
const DAY_MODE_CYCLE = {cook:"quick",quick:"rest",rest:"off",off:"cook"};
function wizCycleDayMode(wo, day){
  const k=`${wo}_${day}`;
  S.wiz.cookDays[k] = DAY_MODE_CYCLE[S.wiz.cookDays[k]||"cook"];
  set({});
}
function wizTogglePlanDay(wo, day){
  const pd=S.wiz.planDays;
  const isIn=pd.some(p=>p.wo===wo&&p.day===day);
  S.wiz.planDays=isIn?pd.filter(p=>!(p.wo===wo&&p.day===day)):[...pd,{wo,day}];
  set({});
}
function wizToggleMpDay(wo, day){
  const days=S.wiz.mealprep.days;
  const isIn=days.some(m=>m.wo===wo&&m.day===day);
  S.wiz.mealprep.days=isIn?days.filter(m=>!(m.wo===wo&&m.day===day)):[...days,{wo,day}];
  set({});
}

function wizFinish(){
  // Apply preview to correct week(s) in localStorage
  [0,1].forEach(wo=>{
    if(!S.wiz.preview[wo]) return;
    const plannedDays=S.wiz.planDays.filter(p=>p.wo===wo).map(p=>p.day);
    if(!plannedDays.length) return;
    const isCurrentWeek=wo===(S.weekOffset||0);
    const weekData=isCurrentWeek?{...S.week}:lsGet(weekStoreKey(wo),emptyWeek());
    plannedDays.forEach(day=>{
      if(S.wiz.preview[wo][day]) weekData[day]={...S.wiz.preview[wo][day]};
    });
    lsSet(weekStoreKey(wo),weekData);
    if(isCurrentWeek) S.week={...weekData};
  });
  // Apply in-huis to checked (pre-check items they already have)
  Object.keys(S.wiz.inHuis).forEach(k=>{
    if(S.wiz.inHuis[k]) S.checked[k] = true;
  });
  lsSet(CHK, S.checked);
  set({wizOpen:false, wizStep:1});
  toast("Week ingepland! 🎉");
}
